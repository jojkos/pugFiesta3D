<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/logo.png" />

      name="description"
      content="Pug Banger Fiesta — a fast, chaotic low-poly pug chase. Sprint, dash, latch, climb the leaderboard. Free to play in your browser."

      name="keywords"

    <meta property="og:image:height" content="733" />
    <meta property="og:locale" content="cs_CZ" />
    <meta property="og:locale:alternate" content="en_US" />
