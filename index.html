<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/logo.png" />
    <link rel="apple-touch-icon" href="/assets/images/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ff8e6c" />

    <!-- PWA / iOS full-screen support (Add to Home Screen → runs as standalone app) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pug Fiesta" />
    <meta name="format-detection" content="telephone=no" />

    <title>Pug Banger Fiesta — Low-Poly Pug Chase Arcade Game</title>
    <meta
      name="description"
      content="Pug Banger Fiesta is a low-poly arcade chase where two pugs sprint, dodge, and pounce. Cut the angle, time the tag, and stack combos before the clock runs out. Play free in your browser."
    />
    <meta
      name="keywords"
      content="pug banger fiesta, pug banger game, 3d arcade, low poly, browser game, chase game, indie game, tag game, pugs"
    />
    <meta name="author" content="Pug Banger Fiesta" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pug Banger Fiesta" />
    <meta property="og:title" content="Pug Banger Fiesta — Low-Poly Pug Chase Arcade" />
    <meta
      property="og:description"
      content="Sprint, swerve, pounce. A bite-sized low-poly arcade chase starring two very determined pugs. How many tags can you stack before time runs out?"
    />
    <meta property="og:image" content="/assets/images/logo.png" />
    <meta property="og:image:alt" content="Two cartoon pugs in the Pug Banger Fiesta logo" />
    <meta property="og:image:width" content="370" />
    <meta property="og:image:height" content="370" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="cs_CZ" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pug Banger Fiesta — Low-Poly Pug Chase Arcade" />
    <meta
      name="twitter:description"
      content="Sprint, swerve, pounce. A bite-sized low-poly arcade chase starring two very determined pugs. Free to play in your browser."
    />
    <meta name="twitter:image" content="/assets/images/logo.png" />
    <meta name="twitter:image:alt" content="Two cartoon pugs in the Pug Banger Fiesta logo" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
